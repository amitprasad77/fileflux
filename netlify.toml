# netlify.toml
# ─────────────────────────────────────────────────
# Place this file in the ROOT of your project.
# It tells Netlify how to build and route requests.

[build]
  publish = "."          # Serve files from root
  functions = "netlify/functions"  # Serverless functions folder

# Rewrite /api/* calls to Netlify Functions
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Optional: redirect www to non-www
[[redirects]]
  from = "https://www.yoursite.com/*"
  to = "https://yoursite.com/:splat"
  status = 301
  force = true

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
